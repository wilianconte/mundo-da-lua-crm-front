name: CI/CD - Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar versao da aplicacao
        id: app_version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "value=${PACKAGE_VERSION}+build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mundo-da-lua-crm-front:build
          build-args: |
            NEXT_PUBLIC_GRAPHQL_ENDPOINT=${{ secrets.NEXT_PUBLIC_GRAPHQL_ENDPOINT_PRD }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.app_version.outputs.value }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload da imagem
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Download da imagem
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-front
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Load, tag e push da imagem
        run: |
          docker load --input /tmp/image.tar
          while IFS= read -r tag; do
            docker tag mundo-da-lua-crm-front:build "$tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

  rollout:
    name: Rollout
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Rollout restart no cluster
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          ROLLOUT_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/mundo-da-lua-crm-front:sha-${GITHUB_SHA::7}"
          CONTAINER_NAME=$(kubectl get deployment/mundo-da-lua-crm-front -n mundo-da-lua-crm-prd -o jsonpath='{.spec.template.spec.containers[0].name}')
          kubectl set image deployment/mundo-da-lua-crm-front \
            "${CONTAINER_NAME}=${ROLLOUT_IMAGE}" \
            -n mundo-da-lua-crm-prd
          kubectl rollout restart deployment/mundo-da-lua-crm-front -n mundo-da-lua-crm-prd
          kubectl rollout status deployment/mundo-da-lua-crm-front -n mundo-da-lua-crm-prd --timeout=180s
